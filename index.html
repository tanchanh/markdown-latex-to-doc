<html lang="vi">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (typeof marked === 'undefined') {
            document.write('<script src="js/marked.min.js"><\/script>');
        }
    </script>

    <!-- Cấu hình MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: { '[+]': ['ams'] }
            },
            svg: {
                fontCache: 'none',
                scale: 1,
                minScale: 1
            },
            startup: { typeset: false }
        };
    </script>
    <!-- Thư viện MathJax (Xử lý Toán) -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script>
        if (typeof MathJax === 'undefined' || !MathJax.typesetPromise) {
            document.write('<script id="MathJax-script" async src="js/tex-svg.js"><\/script>');
        }
    </script>

    <style>
        /* --- CSS TỰ VIẾT (NO EXTERNAL LIBS) --- */

        :root {
            --primary-color: #0a00d1;
            /* Indigo 600 */
            --primary-hover: #4338ca;
            /* Indigo 700 */
            --bg-color: #f8fafc;
            /* Slate 50 */
            --border-color: #b5d5ff;
            /* Slate 200 */
            --text-color: #000000;
            /* Slate 700 */
            --toolbar-bg: #f1f5f9;
            /* Slate 100 */
            --toolbar-text: #475569;
            --btn-border: #cbcbcb;
            --btn-hover-bg: #eef2ff;
            --code-color: #000000; /* CHUYỂN TOÀN BỘ MÀU CHỮ SANG ĐEN #000000 */
            --code-bg: rgba(0, 0, 0, 0.05); /* NỀN XÁM NHẸ CHIẾM ĐÚNG 5% TRÊN MÀN HÌNH */
            --divider-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 1.1rem;
        }

        /* --- Header --- */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1.0rem;
            box-shadow: 0 0.1rem 0.3rem rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            z-index: 10;
            flex-shrink: 0;
        }

        header svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.3rem;
        }

        /* --- Main Layout --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        .column {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background-color: white;
        }

        .column:last-child {
            border-right: none;
        }

        /* --- Toolbar --- */
        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 0.5rem 1.0rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.0rem;
            font-weight: bold;
            color: var(--toolbar-text);
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- Button Style --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--btn-border);
            padding: 0.5rem 0.5rem;
            border-radius: 0.3rem;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0.1rem 0.1rem rgba(0, 0, 0, 0.05);
            font-family: inherit;
            height: 2.4rem;
            /* Giữ chiều cao cố định để không bị giật khi ẩn SVG */
            line-height: 1;
        }

        .btn:hover {
            background-color: var(--btn-hover-bg);
            border-color: var(--primary-color);
        }

        .btn svg {
            width: 1.0rem;
            height: 1.0rem;
            flex-shrink: 0;
        }

        .btn span {
            display: inline-block;
        }

        /* --- CĂN LỀ NÚT TRONG HỘP THOẠI CHUẨN XÁC --- */
        .modal-btn {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            width: 100% !important;
            height: 3.2rem !important;
            font-size: 0.95rem !important;
            padding: 0 1.2rem !important;
            border-radius: 0.4rem !important;
        }
        
        .modal-btn svg {
            margin-right: 0.8rem !important;
            width: 1.3rem !important;
            height: 1.3rem !important;
            flex-shrink: 0 !important;
        }

        /* --- Input Area --- */
        #latex-input {
            flex: 1;
            width: 100%;
            padding: 1.0rem;
            border: none;
            resize: none;
            outline: none;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* --- Output Area --- */
        #latex-output {
            flex: 1;
            padding: 1.2rem 2.0rem 2.0rem 2.0rem; /* MỤC SỬA LỖI: Giảm lề trên từ 2.0rem xuống còn 1.2rem cho cân đối */
            overflow-y: auto;
            word-wrap: break-word;
        }

        /* MỤC SỬA LỖI: Triệt tiêu hoàn toàn khoảng cách lề trên của thẻ tiêu đề đầu tiên trong trang Kết Quả */
        #latex-output > :first-child {
            margin-top: 0 !important;
        }

        /* --- Markdown Styles --- */
        .markdown-body {
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* Gộp chung thuộc tính của tiêu đề */
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        /* Gộp đường gạch chân của h1 và h2 */
        .markdown-body h1,
        .markdown-body h2 {
            border-bottom: 2px solid var(--divider-color);
            padding-bottom: 0.3rem;
        }

        .markdown-body h1 {
            font-size: 1.5rem;
        }

        .markdown-body h2 {
            font-size: 1.4rem;
        }

        .markdown-body h3 {
            font-size: 1.3rem;
        }

        .markdown-body p {
            margin-bottom: 1.0rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2.0rem;
            margin-bottom: 1.0rem;
        }

        /* --- PHÂN TÁCH INLINE CODE VÀ BLOCK CODE CHUẨN GITHUB & WORD --- */

        /* 1. Chỉ áp dụng cho inline code thường (ví dụ: `E=mc^2`) */
        .markdown-body :not(pre) > code {
            background-color: var(--code-bg) !important; /* Xám nhẹ 5% */
            color: var(--code-color) !important; /* Màu đen tuyền #000000 */
            padding: 0.2rem 0.4rem !important;
            border-radius: 0.3rem !important;
            font-family: "Consolas", "Monaco", "Courier New", monospace !important; /* Ưu tiên Consolas */
            font-size: 0.95em !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important; /* Khung viền siêu mịn */
        }

        /* 2. Áp dụng cho khối Block Code trong pre (Ví dụ: khối phiếu tính lương) */
        .markdown-body pre {
            background-color: var(--code-bg) !important; /* Xám nhẹ 5% */
            padding: 1.0rem !important;
            border-radius: 0.4rem !important;
            border: 1px solid #cbd5e1 !important; /* Khung viền border xám bao quanh chống lệch chữ */
            overflow-x: auto !important;
            margin-bottom: 1.0rem !important;
        }

        .markdown-body pre code {
            background-color: transparent !important; /* Xoá nền sọc trùng lặp */
            padding: 0 !important;
            border-radius: 0 !important;
            border: none !important;
            color: var(--code-color) !important; /* Màu đen tuyền #000000 */
            font-family: "Consolas", "Monaco", "Courier New", monospace !important; /* Ưu tiên Consolas */
            font-size: 0.95rem !important;
            line-height: 1.5 !important;
            white-space: pre !important; /* Giữ nguyên toàn bộ khoảng trắng thụt lề */
        }

        /* --- MathJax Fixes --- */
        mjx-container[display="false"] {
            margin: 0 0.1rem !important;
            vertical-align: middle !important;
        }

        /* --- CSS KHẮC PHỤC TRÀN VIỀN CÔNG THỨC KHỐI TRÊN MÀN HÌNH --- */
        mjx-container[display="true"] {
            display: block !important;
            margin: 1.5rem 0 !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            max-width: 100% !important;
        }

        /* --- Scrollbar Customization --- */
        ::-webkit-scrollbar {
            width: 0.5rem;
            height: 0.5rem;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 0.3rem;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* --- Tên tác giả --- */
        header .author {
            font-style: normal;
            font-size: 1.2rem;
            color: white;
            margin-left: auto;
        }

        /* --- CSS PHÓNG TO KẾT QUẢ --- */
        body.fullscreen-active header,
        body.fullscreen-active .author {
            display: none !important;
        }

        body.fullscreen-active main .column:first-child {
            display: none !important;
        }

        body.fullscreen-active main .column:last-child {
            width: 100% !important;
            border-right: none !important;
        }

        /* --- CSS PHÓNG TO SOẠN THẢO MỚI --- */
        body.editor-fullscreen-active header,
        body.editor-fullscreen-active .author {
            display: none !important;
        }

        body.editor-fullscreen-active main .column:last-child {
            display: none !important;
        }

        body.editor-fullscreen-active main .column:first-child {
            width: 100% !important;
            border-right: none !important;
        }

        @media (max-width: 48.0rem) {
            main {
                flex-direction: column;
            }

            .column {
                width: 100%;
                height: 50%;
                border-right: none;
                border-bottom: 2px solid var(--border-color);
            }

            body.fullscreen-active main .column:last-child {
                height: 100% !important;
            }

            body.editor-fullscreen-active main .column:first-child {
                height: 100% !important;
            }
        }
    </style>
</head>

# Hướng dẫn sử dụng

## 1. Công thức cùng dòng (Inline)
Phương trình: $E=mc^2$

Nếu muốn công thức to hơn thì thêm `\displaystyle` ở trước công thức.

Ví dụ:
$\displaystyle \int_{a}^{b} x^2 dx$

        const input = document.getElementById('latex-input');

        // --- BỘ LỌC ĐỒNG BỘ \displaystyle TOÀN DIỆN CHO CẢ INLINE VÀ DISPLAY MATH ---
        function escapeMath(text) {
            const mathBlocks = [];
            // MỤC VÁ LỖI CỰC KỲ QUAN TRỌNG: Đã sửa chính xác Regex loại bỏ hoàn toàn khoảng trắng dư thừa
            const regex = /\$\$([\s\S]*?)\$\$|\\\[([\s\S]*?)\\\]|\$([^$\n]*?)\$|\\\(([\s\S]*?)\\\)/g;

            const protectedText = text.replace(regex, (match, g1, g2, g3, g4) => {
                const content = g1 || g2 || g3 || g4;
                if (content && (content.includes('\n#') || content.trim().startsWith('#'))) {
                    return match;
                }

                // ĐƠN GIẢN HOÀ, KHÔNG TỰ ĐỘNG CHÈN \displaystyle VÀO BẤT KỲ CÔNG THỨC NÀO ĐỂ TRÁNH LỖI PHÌNH DÒNG WORD
                mathBlocks.push(match);
                const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;

                if (match.startsWith('$$') || match.startsWith('\\[')) {
                    return `\n\n${placeholder}\n\n`;
                }
                return placeholder;
            });
            return { protectedText, mathBlocks };
        }

        function escapeHtmlLite(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // --- HÀM DỰNG HÌNH RÀO CHẮN AN TOÀN CHỐNG QUÉT NHẦM CODE BLOCK ---
        function renderContent() {

            // 1. Tạm ẩn toàn bộ khối code ra ngoài hành lang an toàn
            const codeBlocks = [];
            const codeRegex = /```[\s\S]*?```|`[^`\n]*?`/g;
            const tempText = rawText.replace(codeRegex, (match) => {
                codeBlocks.push(match);
                return `CODEBLOCKPLACEHOLDER${codeBlocks.length - 1}`;
            });

            // 2. Chạy bộ lọc toán học trên phần văn bản thường còn lại
            const { protectedText, mathBlocks } = escapeMath(tempText);

            // 3. ĐỘT PHÁ QUY TRÌNH: Khôi phục lại khối code thô (dạng Markdown) TRƯỚC KHI cho Marked dịch
            let restoredText = protectedText;
            
            // MỤC SỬA LỖI ĐỘT PHÁ: Duyệt vòng lặp ngược (từ N giảm về 0) để tránh đè trùng khít chữ số
            for (let i = codeBlocks.length - 1; i >= 0; i--) {
                restoredText = restoredText.replace(`CODEBLOCKPLACEHOLDER${i}`, () => codeBlocks[i]);
            }

            // 4. Cho trình Marked dịch văn bản thô (đã khôi phục khối code, toán vẫn ẩn)
            let htmlContent = marked.parse(restoredText);

            // 5. Khôi phục lại công thức toán bằng hàm mũi tên (Vòng lặp ngược tránh đè trùng số)
            for (let i = mathBlocks.length - 1; i >= 0; i--) {
                const safeBlock = escapeHtmlLite(mathBlocks[i]);
                htmlContent = htmlContent.replace(`MATHJAXBLOCKPLACEHOLDER${i}`, () => safeBlock);
            }

            output.innerHTML = htmlContent;

            if (window.MathJax) {
                promise = promise.then(() => {
                    return MathJax.typesetPromise([output]);
                }).catch((err) => console.log('MathJax Error:', err));
            }
        }

        // --- MỤC 2 & 4: HÀM CHUYỂN ĐỔI CANVAS NÂNG CAO AN TOÀN TUYỆT ĐỐI ---
        async function svgToPngDataUrl(svgEl, scale = 3) {
            try {
                // Clone để không thay đổi DOM thật
                const clone = svgEl.cloneNode(true);
                // MỤC VÁ LỖI CỰC KỲ QUAN TRỌNG: Sửa hoàn toàn dấu đóng ngoặc tròn chuẩn xác
                const svg = clone instanceof SVGSVGElement ? clone : (clone.querySelector('svg') || clone);

                // Ghi rõ namespace
                svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

                // Lấy kích thước thực tế của SVG
                const rect = svgEl.getBoundingClientRect();
                let width = Math.max(1, Math.round(rect.width));
                let height = Math.max(1, Math.round(rect.height));

                // Nếu SVG có viewBox, ưu tiên dùng viewBox
                const viewBox = svg.getAttribute('viewBox');
                if (viewBox) {
                    const parts = viewBox.split(/\s+/).map(Number);
                    if (parts.length === 4 && parts[2] > 0 && parts[3] > 0) {
                        width = parts[2];
                        height = parts[3];
                    }
                }

                svg.setAttribute('width', String(width));
                svg.setAttribute('height', String(height));

                // Serialize SVG
                const xml = new XMLSerializer().serializeToString(svg);
                const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);

                // Tạo ảnh tạm để vẽ lên canvas
                const img = await new Promise((resolve, reject) => {
                    const i = new Image();
                    i.crossOrigin = 'anonymous';
                    i.onload = () => resolve(i);
                    i.onerror = (e) => reject(new Error('SVG->Image load failed'));
                    i.src = url;
                });

                // Vẽ lên canvas với scale để tăng độ nét
                const canvas = document.createElement('canvas');
                canvas.width = width * scale;
                canvas.height = height * scale;
                const ctx = canvas.getContext('2d');
                if (!ctx) throw new Error('Canvas context unavailable');
                ctx.setTransform(scale, 0, 0, scale, 0, 0);
                ctx.drawImage(img, 0, 0, width, height);

                URL.revokeObjectURL(url);
                return canvas.toDataURL('image/png');
            } catch (err) {
                console.error('svgToPngDataUrl error', err);
                return null;
            }
        }

        // --- MỤC CẢI TIẾN THÊM VÀO: HÀM ĐỌC VÀ NHẬP TỆP TIN TỪ MÁY TÍNH ---
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFileImport(file);
            }
        }

        function handleFileImport(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                input.value = e.target.result;
                renderContent();
                localStorage.setItem('latex_input', input.value);
                updateActionButtonState(); // Tự động cập nhật nút sang "Xoá" ngay khi nạp file vào!
            };
            reader.readAsText(file);
        }

        // --- MỤC KHÔI PHỤC ĐẦY ĐỦ 100%: CỤM HÀM SAO CHÉP KẾT QUẢ ĐA ĐỊNH DẠNG ---
        function copyOutput() {
            document.getElementById('copy-modal').style.display = 'flex';
        }

        function closeCopyModal() {
            document.getElementById('copy-modal').style.display = 'none';
        }

        async function executeCopy(format) {
            closeCopyModal();
            const btn = document.getElementById('btn-copy-output');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');
            const originalText = span.innerHTML;

            span.innerHTML = 'Đang chép...';
            span.style.color = '#4f46e5';
            svg.style.display = 'none';

            try {
                if (format === 'markdown') {
                    await copyMarkdown();
                } else if (format === 'gdocs') {
                    await copyGoogleDocs();
                } else if (format === 'word') {
                    await copyWord();
                }
                span.innerHTML = '✓ Đã chép!';
                span.style.color = '#16a34a';
            } catch (err) {
                console.error(err);
                span.innerHTML = 'Lỗi copy!';
                span.style.color = '#ef4444';
            }

            setTimeout(() => {
                span.innerHTML = originalText;
                span.style.color = '';
                svg.style.display = '';
            }, 2000);
        }

        async function copyMarkdown() {
            const rawText = input.value;
            try {
                const blobText = new Blob([rawText], { type: 'text/plain' });
                const data = [new ClipboardItem({ 'text/plain': blobText })];
                await navigator.clipboard.write(data);
            } catch (err) {
                console.warn("Clipboard write failed, using fallback:", err);
                const textarea = document.createElement('textarea');
                textarea.value = rawText;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        async function copyGoogleDocs() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = output.innerHTML;
            tempDiv.classList.add('markdown-body');
            tempDiv.style.fontFamily = getComputedStyle(document.body).fontFamily;
            document.body.appendChild(tempDiv);

            if (window.MathJax) {
                await MathJax.typesetPromise([tempDiv]);
            }

            // Ép phông chữ của toàn bộ code inline và code block sang Consolas (MỤC NÂNG CẤP GDOCS)
            const codeEls = tempDiv.querySelectorAll('code, pre');
            codeEls.forEach(el => {
                el.style.fontFamily = "Consolas, 'Courier New', monospace";
            });

            const realSvgs = tempDiv.querySelectorAll('mjx-container svg');
            const tempContainers = tempDiv.querySelectorAll('mjx-container');

            const conversionPromises = Array.from(realSvgs).map(async (svgEl, index) => {
                try {
                    const pngData = await svgToPngDataUrl(svgEl);
                    const container = tempContainers[index];

                    if (pngData && container) {
                        const imgTag = document.createElement('img');
                        imgTag.src = pngData;

                        const rect = svgEl.getBoundingClientRect();
                        imgTag.style.width = rect.width + 'px';
                        imgTag.style.height = rect.height + 'px';
                        imgTag.style.verticalAlign = '-0.5ex';

                        const isDisplay = container.getAttribute('display') === 'true';

                        if (isDisplay) {
                            const divWrapper = document.createElement('div');
                            divWrapper.style.textAlign = 'center';
                            divWrapper.style.margin = '12px 0';
                            divWrapper.appendChild(imgTag);
                            container.replaceWith(divWrapper);
                        } else {
                            container.innerHTML = '';
                            container.appendChild(document.createTextNode('\u00A0'));
                            container.appendChild(imgTag);
                            container.appendChild(document.createTextNode('\u00A0'));
                        }
                    }
                } catch (e) {
                    console.error("Skip error SVG", index);
                }
            });

            await Promise.all(conversionPromises);

            try {
                const blobHtml = new Blob([tempDiv.innerHTML], { type: 'text/html' });
                const blobText = new Blob([tempDiv.innerText], { type: 'text/plain' });
                const data = [new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText })];
                await navigator.clipboard.write(data);
            } catch (err) {
                console.error("Modern clipboard copy failed:", err);
                const selection = window.getSelection();
                selection.removeAllRanges();
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                selection.addRange(range);
                document.execCommand('copy');
                selection.removeAllRanges();
            }

            document.body.removeChild(tempDiv);
        }

        async function copyWord() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = output.innerHTML;
            tempDiv.classList.add('markdown-body');
            tempDiv.style.fontFamily = getComputedStyle(document.body).fontFamily;
            document.body.appendChild(tempDiv);

            if (window.MathJax) {
                await MathJax.typesetPromise([tempDiv]);
            }

            // Ép phông chữ của toàn bộ code inline và code block sang Consolas (MỤC NÂNG CẤP WORD THEO ĐỀ XUẤT)
            const codeEls = tempDiv.querySelectorAll('code, pre');
            codeEls.forEach(el => {
                el.style.fontFamily = "Consolas, 'Courier New', monospace";
            });

            const mjxContainers = tempDiv.querySelectorAll('mjx-container');
            mjxContainers.forEach(container => {
                const mathEl = container.querySelector('mjx-assistive-mml math');
                if (mathEl) {
                    const clonedMath = mathEl.cloneNode(true);
                    clonedMath.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                    
                    const isDisplay = container.getAttribute('display') === 'true';
                    if (isDisplay) {
                        clonedMath.setAttribute('display', 'block');
                        const divWrapper = document.createElement('div');
                        divWrapper.style.textAlign = 'center';
                        divWrapper.style.margin = '12px 0';
                        divWrapper.appendChild(clonedMath);
                        container.replaceWith(divWrapper);
                    } else {
                        clonedMath.setAttribute('display', 'inline');
                        const spaceBefore = document.createTextNode('\u00A0');
                        const spaceAfter = document.createTextNode('\u00A0');
                        container.replaceWith(spaceBefore, clonedMath, spaceAfter);
                    }
                }
            });

            try {
                const blobHtml = new Blob([tempDiv.innerHTML], { type: 'text/html' });
                const blobText = new Blob([tempDiv.innerText], { type: 'text/plain' });
                const data = [new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText })];
                await navigator.clipboard.write(data);
            } catch (err) {
                console.error("Modern clipboard copy failed:", err);
                const selection = window.getSelection();
                selection.removeAllRanges();
                const range = document.createRange();
                range.selectNodeContents(tempDiv);
                selection.addRange(range);
                document.execCommand('copy');
                selection.removeAllRanges();
            }

            document.body.removeChild(tempDiv);
        }

        // --- MỤC 5: TỰ ĐỘNG ĐÓNG TOÀN BỘ MODAL KHI NHẤN PHÍM ESC ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCopyModal();
                closeDownloadModal();
            }
        });
    </script>
