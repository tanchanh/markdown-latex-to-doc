    <script>
        const input = document.getElementById('latex-input');
        const output = document.getElementById('latex-output');
        let promise = Promise.resolve();

        // --- Bá» Lá»C Äá»NG Bá» \displaystyle TOĂN DIá»N CHO Cáșą INLINE VĂ DISPLAY MATH ---
        function escapeMath(text) {
            const mathBlocks = [];
            const correctRegex = /\$\$([\s\S]*?)\$\$|\\\[([\s\S]*?)\\\]|\$([^$\n]*?)\$|\\\(([\s\S]*?)\\\)/g;

            const protectedText = text.replace(correctRegex, (match, g1, g2, g3, g4) => {
                const content = g1 || g2 || g3 || g4;
                if (content && (content.includes('\n#') || content.trim().startsWith('#'))) {
                    return match;
                }

                // 1. Tá»± Äá»ng Äá»ng bá» \displaystyle cho cĂŽng thá»©c khá»i $$ (g1)
                if (g1) {
                    let trimmed = g1.trim();
                    if (!trimmed.startsWith('\\displaystyle')) {
                        trimmed = `\\displaystyle ${trimmed}`;
                    }
                    mathBlocks.push(`$$${trimmed}$$`);
                    const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;
                    return `\n\n${placeholder}\n\n`;
                }

                // 2. Tá»± Äá»ng Äá»ng bá» \displaystyle cho cĂŽng thá»©c khá»i \[ (g2)
                if (g2) {
                    let trimmed = g2.trim();
                    if (!trimmed.startsWith('\\displaystyle')) {
                        trimmed = `\\displaystyle ${trimmed}`;
                    }
                    mathBlocks.push(`\\[${trimmed}\\]`);
                    const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;
                    return `\n\n${placeholder}\n\n`;
                }

                // Má»€C Sá»ŹA Lá»I Äá»T PHĂ Váș N NÄNG: LoáșĄi bá» hoĂ n toĂ n cÆĄ cháșż tá»± Äá»ng Ă©p cá»©ng \displaystyle cho toĂĄn cĂčng dĂČng g3 vĂ  g4
                // Äá» báșŁo tá»n cá»Ą chá»Ż nhá» gá»n (\textstyle) chuáș©n sĂĄch giĂĄo khoa, triá»t tiĂȘu 100% hiá»n tÆ°á»Łng phĂŹnh dĂČng / dĂŁn dĂČng dá»c trong Word!

                // 3. CĂŽng thá»©c cĂčng dĂČng $ (g3) - KHĂNG Ă©p \displaystyle ná»Ża
                if (g3) {
                    mathBlocks.push(`$${g3.trim()}$`);
                    const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;
                    return placeholder;
                }

                // 4. CĂŽng thá»©c cĂčng dĂČng \( (g4) - KHĂNG Ă©p \displaystyle ná»Ża
                if (g4) {
                    mathBlocks.push(`\\(${g4.trim()}\\)`);
                    const placeholder = `MATHJAXBLOCKPLACEHOLDER${mathBlocks.length - 1}`;
                    return placeholder;
                }

                return match;
            });
            return { protectedText, mathBlocks };
        }

        function escapeHtmlLite(text) {
            return text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderContent() {
            const rawText = input.value;

            // Má»€C Sá»ŹA Lá»I Äá»T PHĂ: TáșĄm áș©n toĂ n bá» khá»i code ra ngoĂ i hĂ nh lang an toĂ n TRÆŻá»C KHI xá»­ lĂœ toĂĄn há»c
            const codeBlocks = [];
            const codeRegex = /```[\s\S]*?```|`[^`\n]*?`/g;
            const tempText = rawText.replace(codeRegex, (match) => {
                codeBlocks.push(match);
                return `CODEBLOCKPLACEHOLDER${codeBlocks.length - 1}`;
            });

            // Tiáșżn hĂ nh báșŁo vá» toĂĄn há»c trĂȘn pháș§n vÄn báșŁn thÆ°á»ng cĂČn láșĄi
            const { protectedText, mathBlocks } = escapeMath(tempText);

            // KhĂŽi phá»„c láșĄi khá»i code thĂŽ Äá» trĂŹnh Marked biĂȘn dá»ch chuáș©n cáș„u trĂșc Markdown
            let restoredText = protectedText;
            for (let i = codeBlocks.length - 1; i >= 0; i--) {
                restoredText = restoredText.replace(`CODEBLOCKPLACEHOLDER${i}`, () => codeBlocks[i]);
            }

            let htmlContent = marked.parse(restoredText);

            // KhĂŽi phá»„c láșĄi cĂŽng thá»©c toĂĄn báș±ng hĂ m mĆ©i tĂȘn Äá» trĂĄnh dĂ­nh lá»i kĂœ tá»± Äáș·c biá»t $
            for (let i = mathBlocks.length - 1; i >= 0; i--) {
                const safeBlock = escapeHtmlLite(mathBlocks[i]);
                htmlContent = htmlContent.replace(`MATHJAXBLOCKPLACEHOLDER${i}`, () => safeBlock);
            }

            // Má»€C TĂCH Há»ąP SÆ  Äá» MERMAID CHUáșšN HOĂ: Chuyá»n Äá»i khá»i mĂŁ nguá»n sÆĄ Äá» thĂ nh tháș» váșœ SVG
            htmlContent = htmlContent.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/gi, (match, codeText) => {
                const decoded = codeText.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
                return `<div class="mermaid">${decoded}</div>`;
            });

            output.innerHTML = htmlContent;

            // KĂ­ch hoáșĄt váșœ SÆĄ Äá» Äá»ng Mermaid trá»±c tiáșżp trĂȘn Web
            if (window.mermaid) {
                try {
                    mermaid.run({ nodes: output.querySelectorAll('.mermaid') });
                } catch (e) {
                    console.error("Mermaid run error", e);
                }
            }

            if (window.MathJax) {
                promise = promise.then(() => {
                    return MathJax.typesetPromise([output]);
                }).catch((err) => console.log('MathJax Error:', err));
            }
        }

        // --- Cáș€U HĂNH THá»I GIAN LÆŻU BáșąN NHĂP TRĂNH LAG MĂY ---
        let lastSaveTime = Date.now();
        const SAVE_INTERVAL = 60000; // TrĂČn 1 phĂșt (60 giĂąy) má»i lÆ°u bá» nhá» má»t láș§n

        let timeoutId;
        input.addEventListener('input', () => {
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                renderContent(); // Váșœ cĂŽng thá»©c mÆ°á»Łt mĂ  sau 50ms khi dá»«ng gĂ”

                // Thao tĂĄc gĂ”: Kiá»m tra náșżu Äá»§ 1 phĂșt má»i lÆ°u á» ÄÄ©a má»t láș§n
                const now = Date.now();
                if (now - lastSaveTime >= SAVE_INTERVAL) {
                    localStorage.setItem('latex_input', input.value);
                    lastSaveTime = now;
                }
            }, 50);
        });

        // --- THAO TĂC ÄĂNG/TáșąI Láș I TRANG: Tá»° Äá»NG LÆŻU LáșŹP Tá»šC Äá» KHĂNG Máș€T CHá»ź ---
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('latex_input', input.value);
        });

        // Tá»± Äá»ng phá»„c há»i báșŁn nhĂĄp khi náșĄp láșĄi trang
        window.addEventListener('load', () => {
            const savedContent = localStorage.getItem('latex_input');
            if (savedContent !== null && savedContent.trim() !== "") {
                input.value = savedContent;
            }
            renderContent();
        });

        let clearTimeoutId;
        function clearInput() {
            const btn = document.getElementById('btn-clear');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');

            if (btn.dataset.confirm === "true") {
                input.value = "";
                renderContent();
                localStorage.removeItem('latex_input'); // XoĂĄ báșŁn nhĂĄp khi nháș„n nĂșt xoĂĄ toĂ n bá»
                input.focus();
                resetClearBtn(btn);
            } else {
                btn.dataset.confirm = "true";
                btn.dataset.originalText = span.innerHTML;

                span.innerHTML = 'CháșŻc cháșŻn?';
                span.style.color = '#dc2626';
                span.style.fontWeight = 'bold';
                btn.style.borderColor = '#dc2626';
                svg.style.display = 'none';

                clearTimeoutId = setTimeout(() => {
                    resetClearBtn(btn);
                }, 3000);
            }
        }

        function resetClearBtn(btn) {
            clearTimeout(clearTimeoutId);
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');

            btn.dataset.confirm = "false";
            span.innerHTML = btn.dataset.originalText;
            span.style.color = '';
            span.style.fontWeight = '';
            btn.style.borderColor = '';
            svg.style.display = '';
        }

        // --- CHá»šC NÄNG ÄIá»U HÆŻá»NG HIá»N THá» Há»P THOáș I CHá»N SAO CHĂP ---
        function copyOutput() {
            document.getElementById('copy-modal').style.display = 'flex';
        }

        function closeCopyModal() {
            document.getElementById('copy-modal').style.display = 'none';
        }

        // --- THá»°C THI SAO CHĂP ÄA Äá»NH Dáș NG THEO PHÆŻÆ NG PHĂP CHá»N ---
        async function executeCopy(format) {
            closeCopyModal();
            const btn = document.getElementById('btn-copy-output');
            const span = btn.querySelector('span');
            const svg = btn.querySelector('svg');
            const originalText = span.innerHTML;

            span.innerHTML = 'Äang chĂ©p...';
            span.style.color = '#4f46e5';
            svg.style.display = 'none';

            try {
                if (format === 'markdown') {
                    await copyMarkdown();
                } else if (format === 'gdocs') {
                    await copyGoogleDocs();
                } else if (format === 'word') {
                    await copyWord();
                }
                span.innerHTML = 'â ÄĂŁ chĂ©p!';
                span.style.color = '#16a34a';
            } catch (err) {
                console.error(err);
                span.innerHTML = 'Lá»i copy!';
                span.style.color = '#ef4444';
            }

            setTimeout(() => {
                span.innerHTML = originalText;
                span.style.color = '';
                svg.style.display = '';
            }, 2000);
        }

        // --- 1. CHĂP Dáș NG MARKDOWN ---
        async function copyMarkdown() {
            const rawText = input.value;
            const blobText = new Blob([rawText], { type: 'text/plain' });
            const data = [new ClipboardItem({ 'text/plain': blobText })];
            await navigator.clipboard.write(data);
        }

        // --- 2. CHĂP Dáș NG GOOGLE DOCS (DĂNG áșąNH PNG Äá» NĂT CAO) ---
        async function copyGoogleDocs() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = output.innerHTML;
            tempDiv.classList.add('markdown-body');
            tempDiv.style.fontFamily = getComputedStyle(document.body).fontFamily;
            document.body.appendChild(tempDiv);

            if (window.MathJax) {
                await MathJax.typesetPromise([tempDiv]);
            }

            // Má»€C SÆ  Äá» CHUYá»N PNG KHI COPY GDOCS (CO Gá»N ÄĂNG 50% KĂCH THÆŻá»C Gá»C PHĂNG Äáș I 2X -> TÆŻÆ NG ÄÆŻÆ NG 100% Cá»  LOGIC):
            const mermaidContainers = tempDiv.querySelectorAll('.mermaid');
            const diagramPromises = Array.from(mermaidContainers).map(async (container) => {
                const svgEl = container.querySelector('svg');
                if (svgEl) {
                    try {
                        let origWidth = 0;
                        let origHeight = 0;

                        const viewBox = svgEl.getAttribute('viewBox');
                        if (viewBox) {
                            const parts = viewBox.trim().split(/[\s,]+/).map(Number);
                            if (parts.length === 4 && parts[2] > 0 && parts[3] > 0) {
                                origWidth = parts[2];
                                origHeight = parts[3];
                            }
                        }

                        if (!origWidth || !origHeight) {
                            const attrWidth = parseFloat(svgEl.getAttribute('width'));
                            const attrHeight = parseFloat(svgEl.getAttribute('height'));
                            if (!isNaN(attrWidth) && !isNaN(attrHeight) && attrWidth > 0 && attrHeight > 0) {
                                origWidth = attrWidth;
                                origHeight = attrHeight;
                            }
                        }

                        if (!origWidth || !origHeight) {
                            const rect = svgEl.getBoundingClientRect();
                            origWidth = Math.max(100, Math.round(rect.width));
                            origHeight = Math.max(100, Math.round(rect.height));
                        }

                        const pngData = await svgToPngDataUrl(svgEl);
                        if (pngData) {
                            const imgTag = document.createElement('img');
                            imgTag.src = pngData;

                            // GiáșŁm kĂ­ch thÆ°á»c hiá»n thá» ÄĂșng 50% so vá»i áșŁnh PNG nguá»n 2x (báș±ng 100% kĂ­ch thÆ°á»c logic)
                            const displayWidth = Math.round(origWidth);
                            const displayHeight = Math.round(origHeight);

                            imgTag.setAttribute('width', String(displayWidth));
                            imgTag.setAttribute('height', String(displayHeight));
                            imgTag.style.width = displayWidth + 'px';
                            imgTag.style.height = displayHeight + 'px';

                            const divWrapper = document.createElement('div');
                            divWrapper.style.textAlign = 'center';
                            divWrapper.style.margin = '16px 0';
                            divWrapper.appendChild(imgTag);
                            container.replaceWith(divWrapper);
                        }
                    } catch (e) {
                        console.error("Mermaid GDocs export error", e);
                    }
                }
            });
            await Promise.all(diagramPromises);

            // Má»€C CĂNG THá»šC TOĂN CHUYá»N PNG KHI COPY GDOCS (CO Gá»N ÄĂNG 50% SO Vá»I áșąNH PNG NGUá»N 2X):
            const realSvgs = tempDiv.querySelectorAll('mjx-container svg');
            const tempContainers = tempDiv.querySelectorAll('mjx-container');

            const conversionPromises = Array.from(realSvgs).map(async (svgEl, index) => {
                try {
                    const pngData = await svgToPngDataUrl(svgEl);
                    const container = tempContainers[index];

                    if (pngData && container) {
                        const imgTag = document.createElement('img');
                        imgTag.src = pngData;

                        const rect = svgEl.getBoundingClientRect();
                        
                        // Co lá» hiá»n thá» ÄĂșng 50% quy mĂŽ so vá»i áșŁnh 2x (báș±ng 100% kĂ­ch thÆ°á»c logic)
                        const displayWidth = Math.ceil(rect.width);
                        const displayHeight = Math.ceil(rect.height);

                        imgTag.setAttribute('width', displayWidth);
                        imgTag.setAttribute('height', displayHeight);
                        imgTag.style.width = displayWidth + 'px';
                        imgTag.style.height = displayHeight + 'px';
                        imgTag.style.verticalAlign = '-0.5ex';

                        const isDisplay = container.getAttribute('display') === 'true';

                        if (isDisplay) {
                            const divWrapper = document.createElement('div');

        function cleanMathMLForWord(element) {
            if (!element || element.nodeType !== 1) return;

            // Danh sĂĄch cĂĄc thuá»c tĂ­nh MathML tiĂȘu chuáș©n ÄÆ°á»Łc Word há» trá»Ł cá»±c tá»t
            const allowedAttrs = [
                'xmlns', 'display', 'width', 'height', 'depth', 'align', 
                'rowalign', 'columnalign', 'fence', 'form', 'separator', 
                'stretchy', 'symmetric', 'largeop', 'movablelimits', 'accent'
            ];

            // Láș„y danh sĂĄch táș„t cáșŁ thuá»c tĂ­nh hiá»n táșĄi cá»§a tháș»
            const attrs = Array.from(element.attributes);
            attrs.forEach(attr => {
                // XoĂĄ sáșĄch má»i thuá»c tĂ­nh khĂŽng náș±m trong danh sĂĄch an toĂ n (nhÆ° class, style, id, data-*)
                if (!allowedAttrs.includes(attr.name.toLowerCase())) {
                    element.removeAttribute(attr.name);
                }
            });

            // Äá» quy dá»n dáșčp táș„t cáșŁ cĂĄc tháș» con bĂȘn trong
            Array.from(element.children).forEach(child => {
                cleanMathMLForWord(child);
            });
        }

                            const displayWidth = Math.round(origWidth);

                    cleanMathMLForWord(clonedMath);

                        let spaceText = '\u00A0\u00A0'; // máș·c Äá»nh dĂŁn 2 khoáșŁng tráșŻng
                        if (widthAttr.includes('em')) {
                            const emValue = parseFloat(widthAttr) || 0;
                            if (emValue >= 2) {
                                spaceText = '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0'; // \qquad -> 8 khoáșŁng tráșŻng cá»©ng
                            } else if (emValue >= 1) {
                                spaceText = '\u00A0\u00A0\u00A0\u00A0'; // \quad -> 4 khoáșŁng tráșŻng cá»©ng dĂŁn lá» rá»ng rĂŁi
                            }
                        }
                        const mtext = document.createElementNS('http://www.w3.org/1998/Math/MathML', 'mtext');
                        mtext.textContent = spaceText;
                        mspace.replaceWith(mtext);
                    });

                    // 2. Chuyá»n Äá»i khoáșŁng tráșŻng á» Äáș§u vĂ  cuá»i tháș» mtext thĂ nh dáș„u cĂĄch cá»©ng Äá» trĂĄnh bá» Word tá»± Äá»ng co chá»Ż dĂ­nh biĂȘn
                    const mtexts = clonedMath.querySelectorAll('mtext');
                    mtexts.forEach(mtext => {

                        const spaceBefore = document.createTextNode('\u00A0');

                        container.replaceWith(spaceBefore, clonedMath, spaceAfter);
                    }
                }
            });

            // Ăp cáș„u trĂșc code block vĂ  table cho Äá»ng Äá»u khi dĂĄn vĂ o Word
            const codeEls = tempDiv.querySelectorAll('code');

        async function svgToPngDataUrl(svgElement) {
            return new Promise((resolve, reject) => {
                try {
                    const rect = svgElement.getBoundingClientRect();
                    const scaleFactor = 2; // ĂP Cá»šNG áșąNH PNG NGUá»N Vá» 2X Äá» ÄáșąM BáșąO Äá» NĂT IN áș€N SIĂU VIá»T

                    if (rect.width === 0 || rect.height === 0) { resolve(null); return; }

                    const width = Math.ceil(rect.width * scaleFactor);
                    const height = Math.ceil(rect.height * scaleFactor);

                    const clonedSvg = svgElement.cloneNode(true);

                    const computedStyle = window.getComputedStyle(svgElement);
                    clonedSvg.style.cssText = `
                        font-family: ${computedStyle.fontFamily};
                        font-size: ${computedStyle.fontSize};
                        font-weight: ${computedStyle.fontWeight};
                        color: ${computedStyle.color};
                        width: ${width}px;
                        height: ${height}px;
                    `;

                    clonedSvg.setAttribute("width", width + "px");
                    clonedSvg.setAttribute("height", height + "px");

                    if (!clonedSvg.getAttribute('xmlns')) clonedSvg.setAttribute('xmlns', "http://www.w3.org/2000/svg");
                    if (!clonedSvg.getAttribute('xmlns:xlink')) clonedSvg.setAttribute('xmlns:xlink', "http://www.w3.org/1999/xlink");

                    const svgData = new XMLSerializer().serializeToString(clonedSvg);
                    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
                    const url = URL.createObjectURL(blob);

                    const img = new Image();
                    img.onload = function () {
                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext("2d");
                        ctx.clearRect(0, 0, width, height); // LUĂN ÄĂNG Dáș€U PHáșšY, Sá»ŹA TRIá»T Äá» Lá»I CĂ PHĂP
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Má»€C Sá»ŹA Lá»I Äá»T PHĂ: Ăp cá»©ng phĂŽng Consolas cho toĂ n bá» sÆĄ Äá» khi náșĄp vĂ o Canvas Äá» nĂ©t áșŁnh luĂŽn cĂł phĂŽng Äá»ng nháș„t
                        clonedSvg.querySelectorAll('text, tspan, .labelText, .node label').forEach(node => {
                            node.style.setProperty('font-family', "'Consolas', monospace", 'important');
                        });

                        URL.revokeObjectURL(url);
                        resolve(canvas.toDataURL("image/png"));
                    };
                    img.onerror = (e) => reject(new Error("Image failed to load"));
                    img.src = url;
                } catch (e) {
                    reject(e);
                }
            });
        }

        // --- CHá»šC NÄNG KĂO THáșą FILE ---
        const dragOverlay = document.getElementById('drag-overlay');

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (e.dataTransfer.types.includes('Files')) {
                dragOverlay.style.display = 'flex';
            }
        });

        window.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null || !document.documentElement.contains(e.relatedTarget)) {
                dragOverlay.style.display = 'none';
            }
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'none';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileImport(files[0]);
            }
        });

        window.addEventListener('dragend', () => {
            dragOverlay.style.display = 'none';
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFileImport(file);
            }
            event.target.value = ''; // GiáșŁi phĂłng bá» nhá» Äá»m
        }

        function handleFileImport(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                input.value = e.target.result;
                renderContent();
                localStorage.setItem('latex_input', input.value);
            };
            reader.readAsText(file);
        }
    </script>
</body>

</html>
